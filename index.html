<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数秘術占い</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --deep: #050510;
      --purple: #1a0a2e;
      --blue: #0d1b4b;
    }

    body {
      background: var(--deep);
      color: #e8e0f0;
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 星空 */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* 奥に流れる星雲 */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .nebula-1 { width: 600px; height: 600px; background: #6030a0; top: -100px; left: -100px; }
    .nebula-2 { width: 500px; height: 500px; background: #203080; bottom: -100px; right: -100px; }
    .nebula-3 { width: 300px; height: 300px; background: #a04060; top: 40%; left: 30%; }

    /* メインレイアウト */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    /* ヘッダー */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 1.2s ease both;
    }

    .symbol {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.6), 0 0 60px rgba(201,168,76,0.2);
      letter-spacing: 0.08em;
      line-height: 1.3;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 0.85rem;
      color: rgba(200,180,240,0.6);
      letter-spacing: 0.2em;
    }

    /* 区切り線 */
    .divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
      animation: fadeDown 1.5s ease both;
    }

    /* ルナのイラスト */
    .luna-wrap {
      position: relative;
      margin-bottom: 32px;
      animation: fadeDown 1.3s ease both;
    }

    .luna-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120,60,200,0.4) 0%, transparent 70%);
      animation: lunaGlow 3s ease-in-out infinite;
    }

    @keyframes lunaGlow {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .luna-img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      object-position: top;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.5);
      box-shadow:
        0 0 0 6px rgba(100,50,180,0.2),
        0 0 30px rgba(201,168,76,0.3),
        0 0 60px rgba(100,50,180,0.4);
      display: block;
      position: relative;
      z-index: 1;
    }

    /* チャットエリア */
    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      flex: 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.2),
        0 0 40px rgba(100,60,180,0.3),
        0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp 1.4s ease both;
      background: rgba(10, 5, 30, 0.6);
      backdrop-filter: blur(10px);
    }

    .chat-header {
      background: linear-gradient(135deg, rgba(30,10,60,0.9), rgba(10,20,70,0.9));
      border-bottom: 1px solid rgba(201,168,76,0.25);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-header-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.8rem;
      color: var(--gold-light);
      letter-spacing: 0.1em;
    }

    iframe {
      width: 100%;
      height: 70vh;
      min-height: 500px;
      border: none;
      display: block;
      background: transparent;
    }

    /* フッター */
    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(180,160,220,0.35);
      letter-spacing: 0.15em;
      animation: fadeUp 1.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 流れ星 */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 0;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      transform: translateY(-50%);
    }

    @media (max-width: 600px) {
      iframe { height: 65vh; min-height: 420px; }
      header { margin-bottom: 24px; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="container">
  <header>
    <span class="symbol">✦</span>
    <h1>数秘術占い</h1>
    <p class="subtitle">NUMEROLOGY · 数字があなたの運命を語る</p>
  </header>

  <div class="divider"></div>

  <div class="luna-wrap">
    <div class="luna-glow"></div>
    <img class="luna-img" src="luna.png" alt="数秘術師ルナ">
  </div>

  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="chat-header-dot"></div>
      <span class="chat-header-title">占い師 · LUNA</span>
    </div>
    <iframe
      src="https://udify.app/chatbot/kIr6oeMX3SoClc9G"
      allow="microphone">
    </iframe>
  </div>

  <footer>
    <p>✦ &nbsp; Powered by 数秘術の叡智 &nbsp; ✦</p>
  </footer>
</div>

<script>
  // 星を生成
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const stars = Array.from({length: 200}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    speed: Math.random() * 0.8 + 0.2,
    phase: Math.random() * Math.PI * 2,
  }));

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const op = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 0.001 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // 流れ星
  function shootingStar() {
    const el = document.createElement('div');
    el.className = 'shooting-star';
    el.style.cssText = `
      top: ${Math.random() * 60}%;
      left: ${Math.random() * 80 + 10}%;
      animation: shoot ${Math.random() * 1 + 0.5}s linear forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }

  const style = document.createElement('style');
  style.textContent = `
    @keyframes shoot {
      from { transform: translate(0, 0) rotate(-35deg); opacity: 1; }
      to { transform: translate(-200px, 100px) rotate(-35deg); opacity: 0; }
    }
  `;
  document.head.appendChild(style);

  setInterval(shootingStar, 4000);
  setTimeout(shootingStar, 1000);
</script>
</body>
</html>
